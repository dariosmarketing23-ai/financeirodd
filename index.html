<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraceVision — Gestão Financeira</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ===== RESET & ROOT ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0d14;--bg2:#12141f;--bg3:#191c2b;
  --accent:#6366f1;--accent2:#a78bfa;--accent3:#818cf8;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --border:rgba(255,255,255,.06);
  --glass:rgba(255,255,255,.03);--glass-b:rgba(255,255,255,.06);
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,.4);
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
html{font-size:15px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 20%,rgba(99,102,241,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 80%,rgba(167,139,250,.08) 0%,transparent 50%);
  background-attachment:fixed;overflow-x:hidden}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:rgba(18,20,31,.8);backdrop-filter:blur(20px);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:1.5rem;position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform .3s}
.main{margin-left:260px;flex:1;padding:2rem 2.5rem;min-height:100vh;overflow-x:hidden;max-width:calc(100vw - 260px)}

/* ===== SIDEBAR ===== */
.logo{display:flex;align-items:center;gap:.75rem;margin-bottom:2.5rem}
.logo-icon{width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:#fff}
.logo h2{font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.logo small{display:block;color:var(--text3);font-size:.7rem;font-weight:400;margin-top:2px}

.nav{display:flex;flex-direction:column;gap:.35rem;flex:1}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:var(--radius-sm);
  cursor:pointer;color:var(--text2);font-size:.9rem;font-weight:500;
  border:1px solid transparent;transition:all .2s}
.nav-item:hover{background:var(--glass);color:var(--text)}
.nav-item.active{background:var(--glass);border-color:var(--glass-b);color:var(--text);font-weight:600}
.nav-item svg{width:20px;height:20px;opacity:.7}
.nav-item.active svg{opacity:1}

.sidebar-footer{margin-top:auto;padding-top:1.5rem;border-top:1px solid var(--border)}
.sidebar-footer p{color:var(--text3);font-size:.75rem;text-align:center}

/* ===== HEADER ===== */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.page-header h1{font-size:1.7rem;font-weight:700;letter-spacing:-.03em}
.page-header p{color:var(--text2);font-size:.875rem;margin-top:.25rem}

/* ===== CARDS ===== */
.card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-b);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;transition:transform .2s,border-color .2s;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,.12)}

/* ===== KPI CARDS ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem;margin-bottom:2rem}
.kpi .kpi-label{display:flex;align-items:center;gap:.5rem;color:var(--text2);font-size:.8rem;font-weight:500;margin-bottom:.5rem}
.kpi .kpi-value{font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
.kpi .kpi-sub{font-size:.75rem;color:var(--text3);margin-top:.35rem}
.kpi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ===== CHARTS ===== */
.chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:1.25rem;margin-bottom:2rem}
.chart-title{font-size:1rem;font-weight:600;margin-bottom:1rem}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;padding-bottom:.5rem}
table{width:100%;border-collapse:collapse;min-width:600px}
thead th{padding:.85rem 1rem;text-align:left;color:var(--text2);font-weight:500;font-size:.8rem;
  text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:rgba(0,0,0,.15);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:.85rem 1rem;font-size:.875rem;white-space:nowrap}
.badge{display:inline-block;padding:.2rem .5rem;border-radius:6px;font-size:.75rem;font-weight:500}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-blue{background:rgba(99,102,241,.15);color:var(--accent3)}
.badge-amber{background:rgba(245,158,11,.15);color:var(--amber)}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.7rem 1.25rem;border-radius:var(--radius-sm);
  font-family:inherit;font-size:.875rem;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  box-shadow:0 4px 15px rgba(99,102,241,.35)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(99,102,241,.45);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.btn-sm{padding:.5rem .85rem;font-size:.8rem}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--glass-b);border-radius:var(--radius);
  padding:2rem;width:95%;max-width:520px;box-shadow:0 24px 64px rgba(0,0,0,.5);
  transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-size:1.2rem;margin-bottom:1.5rem}
.modal label{display:block;color:var(--text2);font-size:.8rem;font-weight:500;margin-bottom:.35rem}
.modal input,.modal select,.modal textarea{width:100%;padding:.7rem .85rem;background:rgba(0,0,0,.25);
  border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;
  font-size:.875rem;outline:none;transition:border-color .2s}
.modal input:focus,.modal select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.modal select option{background:var(--bg2);color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{margin-bottom:1rem}
.form-actions{display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem}
.radio-group{display:flex;gap:1rem}
.radio-group label{display:flex;align-items:center;gap:.4rem;cursor:pointer;font-size:.875rem;color:var(--text);font-weight:400}
.radio-group input[type=radio]{accent-color:var(--accent)}

/* ===== PROGRESS BAR ===== */
.progress-bar{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s ease}

/* ===== ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .4s ease forwards}
.anim-d1{animation-delay:.05s;opacity:0}
.anim-d2{animation-delay:.1s;opacity:0}
.anim-d3{animation-delay:.15s;opacity:0}
.anim-d4{animation-delay:.2s;opacity:0}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:3rem;color:var(--text3)}
.empty-state svg{width:48px;height:48px;opacity:.4;margin-bottom:1rem}
.empty-state p{font-size:.9rem}

/* ===== LOCK SCREEN ===== */
.lock-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s, visibility .4s;
  background-image:radial-gradient(ellipse at 50% 50%,rgba(99,102,241,.15) 0%,transparent 70%);backdrop-filter:blur(20px)}
.lock-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.lock-box{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:var(--radius);padding:3rem 2.5rem;text-align:center;box-shadow:var(--shadow);max-width:400px;width:90%;transform:translateY(0);transition:transform .4s}
.lock-screen.hidden .lock-box{transform:translateY(-20px)}
.lock-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:2rem;font-weight:800;margin:0 auto 1.5rem;box-shadow:0 8px 24px rgba(99,102,241,.3)}
.lock-title{font-size:1.5rem;font-weight:700;margin-bottom:.5rem;letter-spacing:-.03em}
.lock-desc{color:var(--text2);font-size:.9rem;margin-bottom:2rem}
.lock-input{width:100%;text-align:center;font-size:2rem;letter-spacing:.2em;padding:1rem;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;margin-bottom:1.5rem;font-family:monospace;transition:border-color .2s}
.lock-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.lock-input.error{border-color:var(--red);animation:shake .4s}
.lock-btn{width:100%;padding:1rem;font-size:1rem;font-weight:600;justify-content:center}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding:1.25rem;max-width:100vw}
  .chart-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .hamburger{display:flex!important}
}
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:150;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem;cursor:pointer;
  align-items:center;justify-content:center}
.hamburger svg{width:24px;height:24px;color:var(--text)}

/* ===== SEARCH ===== */
.search-box{display:flex;align-items:center;gap:.5rem;background:rgba(0,0,0,.2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.55rem .85rem;max-width:280px}
.search-box input{background:none;border:none;color:var(--text);font-family:inherit;font-size:.85rem;width:100%;outline:none}
.search-box svg{width:16px;height:16px;color:var(--text3);flex-shrink:0}

/* ===== TABS ===== */
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.tab{padding:.5rem 1rem;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;
  color:var(--text2);background:transparent;border:1px solid transparent;transition:all .2s}
.tab.active{background:var(--glass);border-color:var(--glass-b);color:var(--text)}
.tab:hover{color:var(--text)}

/* Scroll */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
</style>
</head>

// ===== CLOUD INITIALIZATION (NON-BLOCKING) =====
async function initFromSupabase() {
  if (!supabaseClient) return;
  try {
    const { data, error } = await supabaseClient.from('app_data').select('key, data')
    if (error) throw error
    if (data && data.length > 0) {
      // Cloud has data — load it into localStorage and refresh UI
      data.forEach(row => {
        localStorage.setItem('gv_' + row.key, JSON.stringify(row.data))
      })
      console.log('✅ Dados carregados do Supabase:', data.length, 'registros')
      render() // Refresh UI with cloud data
    } else {
      // Cloud is empty — push local data to cloud
      console.log('☁️ Supabase vazio, migrando dados locais...')
      const keys = ['accounts','clients','transactions','installments','indicators']
      for (const k of keys) {
        const v = LS.get(k, [])
        // Simple check if it has entries before trying to push
        if (v && Object.keys(v).length > 0) {
          await LS._syncToCloud(k, v)
        }
      }
      console.log('✅ Dados migrados para o Supabase')
    }
  } catch(e) {
    console.warn('⚠️ Falha ao conectar ao Supabase:', e)
  }
}

// Start the app after all declarations
function startApp() {
  seedIfEmpty() // Always ensure local data is ready first
  render()      // Render immediately from local cache (FAST)
  initFromSupabase() // Sync with cloud in the background
}

  render()

function render() {

  if(lineChart){lineChart.destroy();lineChart=null}
  if(doughnutChart){doughnutChart.destroy();doughnutChart=null}
  if(projChart){projChart.destroy();projChart=null}

  switch(currentPage) {
    case 'dashboard': mc.innerHTML = renderDashboard(); initCharts(); break
    case 'transactions': mc.innerHTML = renderTransactions(); break
    case 'clients': mc.innerHTML = renderClients(); break
    case 'planning': mc.innerHTML = renderPlanning(); break
    case 'accounts': mc.innerHTML = renderAccounts(); break
    case 'projections': mc.innerHTML = renderProjections(); initProjectionChart(); break
  }
}

function initCharts() {
  const rawTxs = LS.get('transactions',[])
  let txs = rawTxs
  
  if (globalFilterType !== 'Todas') txs = txs.filter(t=>t.type === globalFilterType)
  if (globalFilterCat !== 'Todas') txs = txs.filter(t=>t.category === globalFilterCat)
  if (globalFilterStatus !== 'Todas') {
    const isConf = globalFilterStatus === 'confirmed'
    txs = txs.filter(t=>t.confirmed === isConf)
  }

  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']
  const now = new Date()

  // 6-Month Forward Cash Flow Projection
  const incomeData = [], expenseData = [], balanceData = [], labels = []
  const currentBalance = LS.get('accounts',[]).reduce((a,c)=>a+c.balance,0)

  for (let i = 0; i <= 5; i++) {
    const m = (now.getMonth() + i) % 12
    const y = now.getFullYear() + Math.floor((now.getMonth() + i) / 12)
    labels.push(months[m])
    
    const mTxs = txs.filter(t => { const d = new Date(t.date + 'T12:00:00'); return d.getMonth()===m && d.getFullYear()===y })
    incomeData.push(mTxs.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0))
    expenseData.push(mTxs.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0))

    // Projected accumulated balance at the end of this month
    const targetDate = new Date(y, m + 1, 0, 23, 59, 59)
    const pendingTxsUpToMonth = txs.filter(t => {
      if (t.confirmed) return false;
      const d = new Date(t.date + 'T12:00:00');
      return d <= targetDate;
    })
    const pendingInc = pendingTxsUpToMonth.filter(t=>t.type==='income').reduce((a,t)=>a+t.amount,0)
    const pendingExp = pendingTxsUpToMonth.filter(t=>t.type==='expense').reduce((a,t)=>a+t.amount,0)
    
    balanceData.push(currentBalance + pendingInc - pendingExp)
  }

  const chartDefaults = { color: 'rgba(255,255,255,.6)' }
  const gridColor = 'rgba(255,255,255,.06)'

  const lineCtx = document.getElementById('lineChart')
  if (lineCtx) {
    lineChart = new Chart(lineCtx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { type:'line', label:'Saldo Acumulado', data:balanceData, borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.1)', borderWidth:2, tension:0.3, fill:true },
          { type:'bar', label:'Receitas Previstas', data:incomeData, backgroundColor:'rgba(34,197,94,.6)', borderRadius:6, barPercentage:.4 },
          { type:'bar', label:'Despesas Previstas', data:expenseData, backgroundColor:'rgba(239,68,68,.5)', borderRadius:6, barPercentage:.4 }
        ]
      },
      options: {
        responsive:true,
        plugins:{legend:{position:'top',labels:chartDefaults}},
        scales:{
          x:{ticks:chartDefaults,grid:{color:gridColor}},
          y:{ticks:{...chartDefaults,callback:v=>currency(v)},grid:{color:gridColor}}
        }
      }
    })
  }

  // Doughnut
  const catMap = {}
  const month = now.getMonth(), year = now.getFullYear()
  txs.filter(t => { const d=new Date(t.date + 'T12:00:00'); return d.getMonth()===month && d.getFullYear()===year && t.type==='expense' })
    .forEach(t => { catMap[t.category] = (catMap[t.category]||0)+t.amount })

  const dCtx = document.getElementById('doughnutChart')
  if (dCtx) {
    const cats = Object.keys(catMap)
    const colors = ['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#06b6d4','#ec4899','#f97316']
    doughnutChart = new Chart(dCtx, {
      type: 'doughnut',
      data: {
        labels: cats,
        datasets: [{ data: cats.map(c=>catMap[c]), backgroundColor: colors.slice(0,cats.length), borderWidth:0 }]
      },
      options: {
        responsive:true,
        cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{...chartDefaults,padding:12,usePointStyle:true,pointStyleWidth:8}}}
      }
    })
  }
}

function renderTransactions() {
  const rawTxs = LS.get('transactions',[])
  let allTxs = rawTxs

  if (globalFilterType !== 'Todas') allTxs = allTxs.filter(t=>t.type === globalFilterType)
  if (globalFilterCat !== 'Todas') allTxs = allTxs.filter(t=>t.category === globalFilterCat)
  if (globalFilterStatus !== 'Todas') {
    const isConf = globalFilterStatus === 'confirmed'
    allTxs = allTxs.filter(t=>t.confirmed === isConf)
  }

  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const monthLabel = monthNames[txViewMonth] + ' ' + txViewYear

  // Filter by selected month
  const txs = allTxs.filter(t => {
    const d = new Date(t.date + 'T12:00:00')
    return d.getMonth() === txViewMonth && d.getFullYear() === txViewYear
  })
  const sorted = [...txs].sort((a,b)=>b.date.localeCompare(a.date))

  const confirmedIncome = txs.filter(t=>t.type==='income'&&t.confirmed).reduce((a,t)=>a+t.amount,0)
  const pendingIncome = txs.filter(t=>t.type==='income'&&!t.confirmed).reduce((a,t)=>a+t.amount,0)
  const confirmedExpense = txs.filter(t=>t.type==='expense'&&t.confirmed).reduce((a,t)=>a+t.amount,0)
  const pendingExpense = txs.filter(t=>t.type==='expense'&&!t.confirmed).reduce((a,t)=>a+t.amount,0)
  const pendingCount = txs.filter(t=>!t.confirmed).length

  return `
    <div class="page-header anim">
      <div><h1>Lançamentos</h1><p>Gerencie todas as suas receitas e despesas</p></div>
      <button class="btn btn-primary" onclick="openTransactionModal()">+ Novo Lançamento</button>
    </div>

    ${renderGlobalFilters(rawTxs)}

    <div class="card anim" style="display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:1rem 1.5rem;margin-bottom:1.25rem">
      <button class="btn btn-outline btn-sm" onclick="changeTxMonth(-1)" style="font-size:1.1rem;padding:.4rem .8rem">◀</button>
      <span style="font-size:1.15rem;font-weight:600;min-width:180px;text-align:center">📅 ${monthLabel}</span>
      <button class="btn btn-outline btn-sm" onclick="changeTxMonth(1)" style="font-size:1.1rem;padding:.4rem .8rem">▶</button>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="card kpi anim anim-d1">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--green)"></span>Receitas do Mês</div>
        <div class="kpi-value" style="color:var(--green)">${currency(confirmedIncome + pendingIncome)}</div>
        <div class="kpi-sub">✅ ${currency(confirmedIncome)} · ⏳ ${currency(pendingIncome)}</div>
      </div>
      <div class="card kpi anim anim-d2">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--red)"></span>Despesas do Mês</div>
        <div class="kpi-value" style="color:var(--red)">${currency(confirmedExpense + pendingExpense)}</div>
        <div class="kpi-sub">✅ ${currency(confirmedExpense)} · ⏳ ${currency(pendingExpense)}</div>
      </div>
      <div class="card kpi anim anim-d3">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--accent)"></span>Saldo do Mês</div>
        <div class="kpi-value" style="color:${(confirmedIncome+pendingIncome-confirmedExpense-pendingExpense)>=0?'var(--green)':'var(--red)'}">${currency((confirmedIncome+pendingIncome)-(confirmedExpense+pendingExpense))}</div>
        <div class="kpi-sub">Confirmado: ${currency(confirmedIncome - confirmedExpense)}</div>
      </div>
      <div class="card kpi anim anim-d4">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--amber)"></span>Pendentes</div>
        <div class="kpi-value" style="color:var(--amber)">${pendingCount}</div>
        <div class="kpi-sub">lançamento(s) a confirmar</div>
      </div>
    </div>

    ${(() => {
      const tStart = new Date(txViewYear, txViewMonth, 1)
      const monthRawTxs = rawTxs.filter(t => {
        const d = new Date(t.date + 'T12:00:00')
        return d.getMonth() === txViewMonth && d.getFullYear() === txViewYear
      })
      
      const accs = LS.get('accounts',[])
      let totalBal = accs.reduce((a,c)=>a+c.balance,0)
      let fNet = 0
      rawTxs.forEach(t => {
        if (!t.confirmed) return
        const d = new Date(t.date + 'T12:00:00')
        if (d >= tStart) fNet += t.type==='income' ? t.amount : -t.amount
      })
      let rollingBalance = totalBal - fNet
      const startBalDisplay = rollingBalance

      const weeks = [
        { label: 'Semana 1 (1 a 7)', start: 1, end: 7, inc: 0, exp: 0 },
        { label: 'Semana 2 (8 a 14)', start: 8, end: 14, inc: 0, exp: 0 },
        { label: 'Semana 3 (15 a 21)', start: 15, end: 21, inc: 0, exp: 0 },

                  <th style="text-align:right">Receitas</th>
                  <th style="text-align:right">Despesas</th>

                  <td style="text-align:right;font-weight:700;color:var(--accent2)">${currency(startBalDisplay)}</td>
                </tr>
                ${weeklySummaryRows}
              </tbody>
            </table>
          </div>
        </div>
      `
    })()}

    <div class="card anim anim-d3">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Status</th><th></th></tr></thead>
          <tbody>
            ${sorted.map(tx => {
              const txDate = new Date(tx.date + 'T12:00:00')
              const now = new Date()
              now.setHours(0,0,0,0)
              const isOverdue = !tx.confirmed && (txDate < now)

              let statusLabel = tx.confirmed
                ? (tx.type === 'income' ? 'Recebido' : 'Debitado')
                : (tx.type === 'income' ? 'A receber' : 'A debitar')
              
              let statusIcon = tx.confirmed ? '✅' : '⏳'
              let btnClass = tx.confirmed ? 'badge-green' : 'badge-amber'
              
              let overdueBadge = ''
              if (isOverdue) {
                statusLabel = tx.type === 'income' ? 'Receita Atrasada' : 'Atrasado'
                statusIcon = '⚠️'
                btnClass = 'badge-red'
                overdueBadge = '<span class="badge badge-red" style="font-size:0.65rem;margin-left:0.5rem">Vencido</span>'
              }

              return `
              <tr style="${!tx.confirmed && !isOverdue ? 'opacity:.75' : ''}">
                <td>
                  <div style="font-weight:500;color:${isOverdue?'var(--red)':''}">${fmtDate(tx.date)}</div>
                </td>
                <td style="font-weight:500">
                  ${tx.description}
                  ${overdueBadge}
                </td>
                <td><span class="badge ${tx.type==='income'?'badge-green':'badge-red'}">${tx.category}</span></td>
                <td style="color:${tx.type==='income'?'var(--green)':'var(--red)'};font-weight:600">
                  ${tx.type==='income'?'+':'−'} ${currency(tx.amount)}

                <td>
                  <button class="btn btn-sm ${btnClass}" style="cursor:pointer;border:none;padding:.3rem .6rem;border-radius:6px;font-size:.75rem" onclick="toggleConfirm('${tx.id}')">
                    ${statusIcon} ${statusLabel}

                </td>
                <td style="white-space:nowrap">

                  <button class="btn btn-danger btn-sm" onclick="deleteTransaction('${tx.id}')">✕</button>

              </tr>`
            }).join('')}
          </tbody>
        </table>
        ${sorted.length===0 ? '<div class="empty-state"><p>Nenhum lançamento em '+monthLabel+'.</p></div>' : ''}
      </div>
    </div>
  `
}

  txViewMonth += dir
  if (txViewMonth > 11) { txViewMonth = 0; txViewYear++ }
  if (txViewMonth < 0) { txViewMonth = 11; txViewYear-- }
  render()
}

function saveTransaction(e, editId) {
  e.preventDefault()
  const txs = LS.get('transactions',[])
  const type = document.querySelector('input[name=txtype]:checked').value
  const data = {
    description: document.getElementById('tx-desc').value,
    amount: parseFloat(document.getElementById('tx-amount').value),
    date: document.getElementById('tx-date').value,
    category: document.getElementById('tx-cat').value,
    type,
    accountId: document.getElementById('tx-acc').value,
    confirmed: document.getElementById('tx-confirmed').value === 'true'
  }

  // Check for recurrence
  const recurCheckbox = document.getElementById('tx-recur')
  const isRecurring = recurCheckbox && recurCheckbox.checked

  const idx = editId ? txs.findIndex(t => t.id === editId) : -1
  const originalTx = idx >= 0 ? txs[idx] : null
  const wasRecurring = originalTx && originalTx.recurrenceFreq
  const shouldSpawnNew = isRecurring && !wasRecurring

  // BALANCE ADJUSTMENT: Revert old if confirmed
  const accounts = LS.get('accounts',[])
  if (originalTx && originalTx.confirmed) {
     const accIdx = accounts.findIndex(a=>a.id===originalTx.accountId)
     if(accIdx>=0) accounts[accIdx].balance += (originalTx.type==='income' ? -originalTx.amount : originalTx.amount)
  }

  if (editId) {
    // Update the existing transaction
    if (idx >= 0) {
      txs[idx] = { 
        ...txs[idx], ...data, 
        recurrenceFreq: isRecurring ? (originalTx.recurrenceFreq || document.getElementById('tx-freq').value) : null 
      }
    }
  } else {
    // New single transaction
    data.id = uid()
    if (!shouldSpawnNew) txs.push(data)
  }
  
  // BALANCE ADJUSTMENT: Apply new if confirmed
  if (data.confirmed) {
     const accIdx = accounts.findIndex(a=>a.id===data.accountId)
     if(accIdx>=0) accounts[accIdx].balance += (data.type==='income' ? data.amount : -data.amount)
  }
  LS.set('accounts',accounts)

  // Spawn duplicates ONLY if it's a completely newly marked recurrence
  if (shouldSpawnNew) {
    const freq = document.getElementById('tx-freq').value
    const noEnd = document.getElementById('tx-noend')
    const reps = (noEnd && noEnd.checked) ? 12 : (parseInt(document.getElementById('tx-reps').value) || 1)
    const startDate = new Date(data.date + 'T12:00:00')
    const startIdx = 1 
    
    // If it's new, push the original first
    if (!editId) {
      data.recurrenceFreq = freq
      data.recurrenceGroup = data.description
      txs.push(data)
    }

    for (let i = startIdx; i <= reps; i++) {
      if (editId && i === 0) continue; // safety
      const d = new Date(startDate)
      if (freq === 'weekly') d.setDate(d.getDate() + (i * 7))
      else if (freq === 'biweekly') d.setDate(d.getDate() + (i * 15))
      else {
        const targetMonth = startDate.getMonth() + i
        d.setDate(1) // prevent overflow
        d.setMonth(targetMonth)
        d.setDate(Math.min(startDate.getDate(), new Date(d.getFullYear(), targetMonth + 1, 0).getDate()))
      }

      const dateStr = d.toISOString().split('T')[0]

      txs.push({
        ...data,
        id: uid(),
        date: dateStr,
        description: data.description.replace(/ \(\d+\/\d+\)$/, ''),
        confirmed: false,
        recurrenceGroup: data.description.replace(/ \(\d+\/\d+\)$/, ''),
        recurrenceFreq: freq
      })
    }
  }

  LS.set('transactions', txs)
  closeModal()
  render()
}

function toggleConfirm(id) {
  const txs = LS.get('transactions',[])
  const idx = txs.findIndex(t=>t.id===id)
  if(idx>=0) {
    const tx = txs[idx]
    const wasConfirmed = tx.confirmed
    tx.confirmed = !wasConfirmed
    LS.set('transactions', txs)

    // Adjust account balance
    const accounts = LS.get('accounts',[])
    const accIdx = accounts.findIndex(a=>a.id===tx.accountId)
    if(accIdx>=0) {
      const modifier = tx.confirmed ? 1 : -1
      const amountDelta = (tx.type==='income' ? tx.amount : -tx.amount) * modifier
      accounts[accIdx].balance += amountDelta
      LS.set('accounts', accounts)
    }

    // Auto-update installments when confirming an expense
    if (!wasConfirmed && tx.type === 'expense') updateInstallmentFromTransaction(tx)
    // Revert installment if un-confirming an expense
    if (wasConfirmed && tx.type === 'expense') revertInstallmentFromTransaction(tx)
  }
  render()
}

function updateInstallmentFromTransaction(tx) {
  const installments = LS.get('installments',[])
  const desc = tx.description.toLowerCase()
  const matchIdx = installments.findIndex(inst => {
    const instName = inst.name.toLowerCase()
    // Match if transaction description contains the installment name or vice-versa
    return desc.includes(instName) || instName.includes(desc.split(' ')[0])
      || (desc.includes('corolla') && instName.includes('corolla'))
      || (desc.includes('mentoria eduardo') && instName.includes('mentoria eduardo'))
      || (desc.includes('investimento gracevision') && instName.includes('investimento gv'))
      || (desc.includes('casas bahia') && instName.includes('casas bahia'))
      || (desc.includes('jim.com') && instName.includes('jim.com'))
      || (desc.includes('mercadolivre') && instName.includes('mercadolivre'))
      || (desc.includes('shopee') && instName.includes('shopee'))
      || (desc.includes('gocase') && instName.includes('gocase'))
      || (desc.includes('boticário') && instName.includes('boticário'))
      || (desc.includes('anuidade c&a') && instName.includes('anuidade c&a'))
  })
  if (matchIdx >= 0) {
    const inst = installments[matchIdx]
    if (inst.current < inst.total) {
      inst.current += 1
      inst.remaining = inst.amount * (inst.total - inst.current)
      if (inst.remaining < 0) inst.remaining = 0
      LS.set('installments', installments)
    }
  }
}

function revertInstallmentFromTransaction(tx) {
  const installments = LS.get('installments',[])
  const desc = tx.description.toLowerCase()
  const matchIdx = installments.findIndex(inst => {
    const instName = inst.name.toLowerCase()
    return desc.includes(instName) || instName.includes(desc.split(' ')[0])
      || (desc.includes('corolla') && instName.includes('corolla'))
      || (desc.includes('mentoria eduardo') && instName.includes('mentoria eduardo'))
      || (desc.includes('investimento gracevision') && instName.includes('investimento gv'))
      || (desc.includes('casas bahia') && instName.includes('casas bahia'))
      || (desc.includes('jim.com') && instName.includes('jim.com'))
      || (desc.includes('mercadolivre') && instName.includes('mercadolivre'))
      || (desc.includes('shopee') && instName.includes('shopee'))
      || (desc.includes('gocase') && instName.includes('gocase'))
      || (desc.includes('boticário') && instName.includes('boticário'))
      || (desc.includes('anuidade c&a') && instName.includes('anuidade c&a'))
  })
  if (matchIdx >= 0) {
    const inst = installments[matchIdx]
    if (inst.current > 0) {
      inst.current -= 1
      inst.remaining = inst.amount * (inst.total - inst.current)
      LS.set('installments', installments)
    }
  }
}

function deleteTransaction(id) {
  const txs = LS.get('transactions',[])
  const tx = txs.find(t=>t.id===id)
  if(!tx) return

  if(!confirm('Deseja excluir este lançamento?')) return

  let deleteAll = false;
  if((tx.recurrenceFreq || tx.clientId) && tx.recurrenceGroup) {
      deleteAll = confirm('⚠️ Atenção: Este é um lançamento recorrente ou de contrato.\n\nDeseja excluir também todas as parcelas futuras PENDENTES dessa série?\n\n[OK] = Sim, excluir TODAS as futuras\n[Cancelar] = Não, excluir APENAS esta parcela')
  }

  // Handle balance reversion for the explicitly deleted transaction
  if(tx.confirmed) {
    const accounts = LS.get('accounts',[])
    const accIdx = accounts.findIndex(a=>a.id===tx.accountId)
    if(accIdx>=0){ accounts[accIdx].balance += tx.type==='income' ? -tx.amount : tx.amount; LS.set('accounts',accounts) }
  }

  let finalTxs = txs.filter(t=>t.id!==id)

  // Wipe the future series if requested
  if (deleteAll) {
      finalTxs = finalTxs.filter(t => {
          // Keep if it doesn't match the group, or if it's already paid/confirmed
          if(t.recurrenceGroup === tx.recurrenceGroup && !t.confirmed) return false;
          return true; 
      })
  }

  LS.set('transactions', finalTxs)
  render()
}

function saveClient(e, editId) {
  e.preventDefault()
  const clients = LS.get('clients',[])
  const data = {
    name: document.getElementById('cl-name').value,
    monthlyValue: parseFloat(document.getElementById('cl-value').value),
    payDay: document.getElementById('cl-day').value,
    category: document.getElementById('cl-cat').value,
    status: document.getElementById('cl-status').value,
    startDate: document.getElementById('cl-start').value,
    contractMonths: parseInt(document.getElementById('cl-months').value) || 12
  }
  data.annualRevenue = data.monthlyValue * 12

  if (editId) {
    const idx = clients.findIndex(c=>c.id===editId)
    if(idx>=0) clients[idx] = { ...clients[idx], ...data }
  } else {
    data.id = uid()
    clients.push(data)
    
    // Auto-generate transactions for the entire contract
    const txs = LS.get('transactions',[])
    const accounts = LS.get('accounts',[])
    const defaultAcc = accounts.length > 0 ? accounts[0].id : ''
    const startDate = new Date(data.startDate + 'T12:00:00')
    const prefDay = parseInt(data.payDay) || startDate.getDate()

    for (let i = 0; i < data.contractMonths; i++) {
       const d = new Date(startDate)
       const targetMonth = startDate.getMonth() + i
       d.setDate(1) // prevent rollover
       d.setMonth(targetMonth)
       // Set day to preferred payDay, capped by month length
       if (prefDay > 0) d.setDate(Math.min(prefDay, new Date(d.getFullYear(), targetMonth + 1, 0).getDate()))
       
       txs.push({
           id: uid(),
           description: `Mensalidade ${data.name} (${i+1}/${data.contractMonths})`,
           amount: data.monthlyValue,
           date: d.toISOString().split('T')[0],
           category: data.category,
           type: 'income',
           accountId: defaultAcc,
           confirmed: false,
           recurrenceGroup: `Contrato ${data.name}`,
           recurrenceFreq: 'monthly',
           clientId: data.id
       })
    }
    LS.set('transactions', txs)
  }
  LS.set('clients', clients)
  closeModal()
  render()
}

function deleteClient(id) {
  if(!confirm('Deseja excluir este cliente?\n\nIsso também removerá automaticamente todas as mensalidades (Lançamentos Pendentes) vinculadas ao contrato atual dele. Lançamentos que já foram recebidos (Confirmados) serão mantidos no histórico.')) return
  
  const clients = LS.get('clients',[])
  const cToDelete = clients.find(c=>c.id===id)
  
  if (cToDelete) {
      const txs = LS.get('transactions',[])
      const filteredTxs = txs.filter(t => {
          // Keep all transactions that are already received
          if (t.confirmed) return true
          // Delete if explicitly linked
          if (t.clientId === id) return false
          // Fallback delete for legacy auto-generated contract entries
          if (t.recurrenceGroup === `Contrato ${cToDelete.name}`) return false
          return true
      })
      LS.set('transactions', filteredTxs)
  }

  LS.set('clients', clients.filter(c=>c.id!==id))
  render()
}

  }
  closeModal()
  render()

// ============================================================
function getProjectionData() {
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez']
  const txs = LS.get('transactions',[])
  const projYear = 2026

  // Build monthly arrays from real transactions
  const receitas = new Array(12).fill(0)
  const despesas = new Array(12).fill(0)
  const catBreakdown = {}

  if (txs && txs.length) {
    txs.forEach(t => {
      const d = new Date(t.date + 'T12:00:00')
      if (isNaN(d.getTime()) || d.getFullYear() !== projYear) return
      const mi = d.getMonth()
      if (t.type === 'income') {
        receitas[mi] += t.amount
      } else {
        despesas[mi] += t.amount
        if (!catBreakdown[t.category]) catBreakdown[t.category] = new Array(12).fill(0)
        catBreakdown[t.category][mi] += t.amount
      }
    })
  }

  // Back-calculate start balance from current account balances
  const accounts = LS.get('accounts',[])
  const currentBalance = accounts.reduce((a,c) => a+c.balance, 0)
  const currentMonth = new Date().getMonth()
  let pastNet = 0
  for (let i = 0; i <= currentMonth; i++) pastNet += receitas[i] - despesas[i]
  const janStart = currentBalance - pastNet

  const resultado = []
  const saldo = []
  let accumulated = janStart
  for (let i = 0; i < 12; i++) {
    const net = receitas[i] - despesas[i]
    resultado.push(net)
    accumulated += net
    saldo.push(accumulated)
  }

  return { months, receitas, despesas, catBreakdown, resultado, saldo, janStart }
}

  return `
    <div class="page-header anim">
      <div>
        <h1>Projeções 2026 📈</h1>
        <p>Visão detalhada mês a mês — calculadas a partir dos lançamentos reais</p>

    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">

        <div class="kpi-sub">Média: ${currency(totalReceita/12)}/mês</div>
      </div>
      <div class="card kpi anim anim-d2">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--red)"></span>Despesas Anuais</div>
        <div class="kpi-value" style="color:var(--red)">${currency(totalDespesa)}</div>
        <div class="kpi-sub">Média: ${currency(totalDespesa/12)}/mês</div>
      </div>
      <div class="card kpi anim anim-d3">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--accent)"></span>Resultado Anual</div>
        <div class="kpi-value" style="color:${totalResult>=0?'var(--green)':'var(--red)'}">${currency(totalResult)}</div>
        <div class="kpi-sub">Margem: ${totalReceita>0?(totalResult/totalReceita*100).toFixed(1):'0'}%</div>
      </div>
      <div class="card kpi anim anim-d4">
        <div class="kpi-label"><span class="kpi-dot" style="background:var(--cyan)"></span>Saldo Projetado Dez</div>
        <div class="kpi-value">${currency(saldoFinal)}</div>
        <div class="kpi-sub">Início: ${currency(p.janStart)}</div>
      </div>
    </div>

    <div class="card anim anim-d2" style="margin-bottom:1.25rem">
      <div class="chart-title">Evolução do Saldo Projetado 2026</div>
      <canvas id="projChart" height="100"></canvas>
    </div>

    <div class="card anim anim-d3" style="margin-bottom:1.25rem">
      <div class="chart-title">Projeção Mensal Detalhada</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Mês</th>
              <th style="text-align:right">Receitas</th>
              <th style="text-align:right">Despesas</th>
              <th style="text-align:right">Resultado</th>
              <th style="text-align:right">Saldo Projetado</th>
            </tr>
          </thead>
          <tbody>
            ${p.months.map((m, i) => {
              const isCurrent = i === currentMonth
              const isPast = i < currentMonth
              return `
              <tr style="${isCurrent ? 'background:rgba(99,102,241,.1);font-weight:600' : isPast ? 'opacity:.6' : ''}">
                <td>${m}/2026 ${isCurrent ? '<span style="color:var(--accent);font-size:.7rem">◀ ATUAL</span>' : ''}</td>
                <td style="text-align:right;color:var(--green)">${currency(p.receitas[i])}</td>
                <td style="text-align:right;color:var(--red)">${currency(p.despesas[i])}</td>
                <td style="text-align:right;color:${p.resultado[i]>=0?'var(--green)':'var(--red)'}; font-weight:600">
                  ${p.resultado[i]>=0?'+':''}${currency(p.resultado[i])}
                </td>
                <td style="text-align:right;font-weight:600">${currency(p.saldo[i])}</td>
              </tr>`
            }).join('')}
            <tr style="border-top:2px solid var(--border);font-weight:700;background:rgba(255,255,255,.03)">
              <td>TOTAL 2026</td>
              <td style="text-align:right;color:var(--green)">${currency(totalReceita)}</td>
              <td style="text-align:right;color:var(--red)">${currency(totalDespesa)}</td>
              <td style="text-align:right;color:${totalResult>=0?'var(--green)':'var(--red)'}">
                ${totalResult>=0?'+':''}${currency(totalResult)}
              </td>
              <td style="text-align:right">${currency(saldoFinal)}</td>
            </tr>

    <div class="card anim anim-d4">
      <div class="chart-title">Detalhamento — Despesas por Categoria (mensal)</div>
      <div class="table-wrap">
        <table style="min-width:1200px">
          <thead>
            <tr>
              <th>Categoria</th>
              ${p.months.map(m=>'<th style="text-align:right;font-size:.7rem">'+m+'</th>').join('')}
              <th style="text-align:right">Anual</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(p.catBreakdown).sort((a,b)=>b[1].reduce((s,v)=>s+v,0)-a[1].reduce((s,v)=>s+v,0)).map(([name, vals]) => {
              const total = vals.reduce((a,v)=>a+v,0)
              return `<tr>
                <td style="font-weight:500;font-size:.8rem">${name}</td>
                ${vals.map(v=>'<td style="text-align:right;font-size:.8rem;color:var(--text2)">'+(v>0?currency(v):'—')+'</td>').join('')}
                <td style="text-align:right;font-weight:600;font-size:.8rem">${currency(total)}</td>
              </tr>`
            }).join('')}
            ${Object.keys(p.catBreakdown).length===0 ? '<tr><td colspan="14" style="text-align:center;color:var(--text3)">Nenhuma despesa registrada</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    </div>
  `
}

  const chartDefaults = { color: 'rgba(255,255,255,.6)' }

  projChart = new Chart(ctx, {
    type: 'line',
    data: {

      datasets: [
        {
          label: 'Saldo Projetado',

}

function openModal() { document.getElementById('modal-overlay').classList.add('open') }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open') }

// ============================================================
//   AUTH & INIT
// ============================================================
const PIN_CODE = 'grace2026'

function verifyPin() {
  const input = document.getElementById('pin-input')
  if (input.value === PIN_CODE) {
    localStorage.setItem('gv_auth_token', btoa(PIN_CODE))
    document.getElementById('lock-screen').classList.add('hidden')
    startApp() // Start app only AFTER authentication
  } else {
    input.classList.add('error')
    setTimeout(() => input.classList.remove('error'), 400)
    input.value = ''
    input.focus()
  }
}

// Check auth token on page load
if (localStorage.getItem('gv_auth_token') === btoa(PIN_CODE)) {
  document.getElementById('lock-screen').classList.add('hidden')
  startApp() // Bypass lock screen if already authenticated
}
// If not authenticated, the app stays halted behind the lock screen HTML
